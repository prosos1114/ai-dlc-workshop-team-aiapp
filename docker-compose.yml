version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tableorder-db
    environment:
      POSTGRES_DB: tableorder
      POSTGRES_USER: tableorder
      POSTGRES_PASSWORD: tableorder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./table-order-backend
      dockerfile: Dockerfile
    container_name: tableorder-backend
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/tableorder
      DB_USERNAME: tableorder
      DB_PASSWORD: tableorder
      JWT_SECRET: my-super-secret-key-for-jwt-token-generation-min-32-chars
      S3_BUCKET: table-order-images
      AWS_REGION: ap-northeast-2
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - "8080:8080"

volumes:
  postgres_data:
